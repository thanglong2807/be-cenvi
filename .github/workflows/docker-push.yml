name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]  # Chạy khi bạn push code lên branch main
  workflow_dispatch:      # Cho phép bấm nút chạy thủ công

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: thanglong2807/be-cenvi:latest, thanglong2807/be-cenvi:${{ github.sha }}
          # github.sha giúp bạn tạo tag duy nhất dựa trên ID của lần commit