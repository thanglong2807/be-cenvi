name: Build, Push and Deploy

on:
  push:
    branches: [ "master" ]  # Chạy khi push lên branch master
  workflow_dispatch:        # Cho phép bấm nút chạy thủ công

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: thanglong2807/be-cenvi:latest, thanglong2807/be-cenvi:${{ github.sha }}

  deploy:
    runs-on: self-hosted  # Chạy trực tiếp trên máy cây
    needs: build-and-push

    steps:
      - name: Pull image mới và restart container
        shell: powershell
        working-directory: ${{ secrets.SERVER_WORKDIR }}
        run: |
          docker compose pull server
          docker compose up -d --no-deps server
          docker image prune -f