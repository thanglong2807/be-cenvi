version: '3.8'

services:
  server:
    image: thanglong2807/be-cenvi:latest
    container_name: cenvi_backend
    restart: unless-stopped
    ports:
      - "8100:8100"
    env_file:
      - .env
    environment:
      - DOCKER=true
      - MYSQL_URL=mysql+pymysql://root:cenvi@mysql:3306/cenvi_audit
      - DATABASE_URL=mysql+pymysql://root:cenvi@mysql:3306/cenvi_audit
    volumes:
      - ./credentials:/app/credentials:ro
      - ./app/data:/app/app/data
      - ./cenvi_audit.db:/app/cenvi_audit.db:ro
      - ./backups:/app/backups
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - cenvi-network

  mysql:
    image: mysql:8.0
    container_name: cenvi_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: cenvi
      MYSQL_DATABASE: cenvi_audit
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - cenvi-network

networks:
  cenvi-network:
    driver: bridge

volumes:
  mysql_data:
