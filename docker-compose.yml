services:
  server:
    image: thanglong2807/be-cenvi:latest
    container_name: cenvi_backend
    restart: unless-stopped
    ports:
      - "8100:8100"
    env_file:
      - .env
    environment:
      - DOCKER=true
    volumes:
      - ./credentials:/app/credentials:ro
      - ./app/data:/app/app/data
      - ./cenvi_audit.db:/app/cenvi_audit.db
